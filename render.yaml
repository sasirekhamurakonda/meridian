services:
  - type: web
    name: meridian-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_SSL_VERIFY
        value: "true"
      - key: API_KEY
        sync: false
      - key: MAX_CONCURRENT_JOBS
        value: "2"
      - key: RATE_LIMIT_PER_HOUR
        value: "5"
      - key: JOB_TIMEOUT_SECONDS
        value: "600"
